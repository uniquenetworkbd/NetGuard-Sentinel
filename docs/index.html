<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Admin | Command Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav-header d-flex justify-content-between align-items-center p-3">
        <h4>🧠 SENTINEL AI COMMAND CENTER</h4>
        <div id="sys-status"><span class="status-dot"></span> SYSTEM: ACTIVE</div>
    </div>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8">
                <div class="card p-4 mb-4">
                    <h5>🚀 AI Prompt Injector</h5>
                    <div class="input-group mb-3">
                        <input type="text" id="ai-prompt" class="form-control" placeholder="Execute new module...">
                        <button class="btn btn-ai" onclick="triggerAI()">Execute Agent</button>
                    </div>
                </div>
                <div class="card p-4">
                    <h5>🖥️ Live Activity Log</h5>
                    <div id="terminal">[READY] Neural Link Established...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
