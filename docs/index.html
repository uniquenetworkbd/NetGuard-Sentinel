<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Admin | AI-Ops Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; transition: 0.3s; }
        .card:hover { border-color: #58a6ff; }
        .stat-val { font-size: 2.2rem; font-weight: 800; color: #58a6ff; }
        .nav-header { border-bottom: 1px solid #30363d; padding: 20px; background: #010409; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #activity-log { background: #010409; height: 300px; overflow-y: auto; font-family: 'Courier New', monospace; padding: 15px; border-radius: 8px; border: 1px solid #30363d; }
        .status-dot { height: 10px; width: 10px; background-color: #238636; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="nav-header d-flex justify-content-between align-items-center">
        <h4 style="letter-spacing: 2px;">🧠 SENTINEL AI COMMAND CENTER</h4>
        <div><span class="status-dot"></span> <span style="color: #238636;">SYSTEM: ACTIVE</span></div>
    </div>
    <div class="container mt-5">
        <div class="row text-center">
            <div class="col-md-4"><div class="card p-4"><h6>STORAGE ACCESS</h6><div class="stat-val">1024MB</div></div></div>
            <div class="col-md-4"><div class="card p-4"><h6>AI NEURAL LINKS</h6><div class="stat-val" style="color: #bc8cff;">SYNCED</div></div></div>
            <div class="col-md-4"><div class="card p-4"><h6>ACTIVE AGENTS</h6><div class="stat-val">04</div></div></div>
        </div>
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card p-4">
                    <h5>🖥️ Live AI Activity Log</h5>
                    <div id="activity-log">
                        <span style="color: #8b949e;">[05:12:01]</span> <span style="color: #58a6ff;">SYSTEM:</span> Dashboard framework initialized...<br>
                        <span style="color: #8b949e;">[05:12:05]</span> <span style="color: #d29922;">WARNING:</span> Awaiting initial command injection...<br>
                        <span style="color: #8b949e;">[05:12:10]</span> <span style="color: #7ee787;">READY:</span> Sentinel is listening for prompt...
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
                                    </html>
