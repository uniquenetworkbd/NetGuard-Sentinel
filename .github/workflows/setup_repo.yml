name: Initialize Project Structure

on:
  workflow_dispatch: # এটি দিলে আপনি ম্যানুয়ালি বাটন টিপে রান করতে পারবেন

jobs:
  create-folders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Create Folder Structure
        run: |
          mkdir -p app/src/main/java/com/guardnet/vpn
          mkdir -p app/src/main/java/com/guardnet/monitor
          mkdir -p app/src/main/res/layout
          mkdir -p core-native
          mkdir -p docs
          touch app/src/main/java/com/guardnet/vpn/.gitkeep
          touch app/src/main/java/com/guardnet/monitor/.gitkeep
          touch core-native/.gitkeep
          touch docs/.gitkeep

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Initial professional project structure"
          git push
