name: Initialize Project Structure

on:
  workflow_dispatch:

jobs:
  create-folders:
    runs-on: ubuntu-latest
    permissions:
      contents: write # সরাসরি এখান থেকেই রাইট পারমিশন দিয়ে দিলাম
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # লেটেস্ট ভার্সন ব্যবহার করছি

      - name: Build Project Skeleton
        run: |
          mkdir -p app/src/main/java/com/guardnet/vpn
          mkdir -p app/src/main/java/com/guardnet/monitor
          mkdir -p app/src/main/res/layout
          mkdir -p core-native
          mkdir -p docs
          touch app/src/main/java/com/guardnet/vpn/.gitkeep
          touch app/src/main/java/com/guardnet/monitor/.gitkeep
          touch core-native/.gitkeep
          touch docs/.gitkeep
          echo "# NetGuard-Sentinel Project Structure" > README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Fix: Initial structure created with write permissions" || echo "No changes to commit"
          git push
