name: 🛠️ Sentinel-Architect: Auto-Coder

on:
  repository_dispatch:
    types: [generate-code] # টেলিগ্রাম থেকে কমান্ড আসলে এটি ট্রিগার হবে
  workflow_dispatch:
    inputs:
      prompt:
        description: 'কী কোড তৈরি করতে হবে?'
        required: true

jobs:
  code-generation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📂 Neural Connection
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: 🤖 AI Code Generation (DeepSeek + Vibecode)
        env:
          DS_KEY: ${{ secrets.NSDS }}
          VIBE_KEY: ${{ secrets.VibecodeCLI }}
          TG_TOKEN: ${{ secrets.TELEGRAMBOTTOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAMCHATID }}
          USER_PROMPT: ${{ github.event.inputs.prompt || github.event.client_payload.prompt }}
        run: |
          echo "🧠 AI is thinking about: $USER_PROMPT"
          
          # DeepSeek থেকে প্রফেশনাল কোড জেনারেট করা
          AI_CODE=$(curl -s https://api.deepseek.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DS_KEY" \
            -d "{
              \"model\": \"deepseek-chat\",
              \"messages\": [
                {\"role\": \"system\", \"content\": \"You are a Senior Software Engineer. Generate only clean, professional code without explanation.\"},
                {\"role\": \"user\", \"content\": \"$USER_PROMPT\"}
              ]
            }" | jq -r '.choices[0].message.content')

          # কোডটি একটি ফাইলে সেভ করা (যেমন: generated_code.txt)
          mkdir -p brain_core/logic/generated
          echo "$AI_CODE" > brain_core/logic/generated/latest_build.py
          
          # টেলিগ্রামে সাকসেস মেসেজ এবং কোড প্রিভিউ পাঠানো
          curl -s -X POST https://api.telegram.org/bot$TG_TOKEN/sendMessage \
            -d chat_id=$CHAT_ID -d text="✅ Sentinel Architect: New code generated and pushed to 'brain_core/logic/generated/' based on your prompt."

      - name: 🛰️ Sync Evolution
        run: |
          git config --global user.name "Sentinel-Architect"
          git config --global user.email "architect@uniquenetwork.bd"
          git add .
          git commit -m "🧠 [ARCHITECT] Auto-generated logic based on user prompt"
          git push origin main
