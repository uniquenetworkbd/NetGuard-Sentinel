name: 🚀 System Health Check Final

on:
  workflow_dispatch: 

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Test Connections (Fixed Variable Names)
        env:
          # আপনার দেওয়া হুবহু নাম এখানে ব্যবহার করা হয়েছে
          DS_KEY: ${{ secrets.NetGuardSentinelDS }}
          TG_TOKEN: ${{ secrets.TELEGRAMBOTTOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAMCHATID }}
        run: |
          echo "🔍 Testing Telegram Connection..."
          TG_RES=$(curl -s -X POST https://api.telegram.org/bot$TG_TOKEN/sendMessage \
            -d chat_id=$CHAT_ID -d text="✅ Telegram Connection: OK (Verified by Sentinel)")
          
          if [[ $TG_RES == *"\"ok\":true"* ]]; then
            echo "Telegram: OK"
          else
            echo "Telegram: FAILED. Please double check TELEGRAMBOTTOKEN and TELEGRAMCHATID."
            exit 1
          fi

          echo "🔍 Testing DeepSeek AI Connection..."
          AI_RES=$(curl -s https://api.deepseek.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DS_KEY" \
            -d '{"model": "deepseek-chat", "messages": [{"role": "user", "content": "Hi"}]}')
          
          if [[ $AI_RES == *"choices"* ]]; then
            echo "DeepSeek AI: OK"
            curl -s -X POST https://api.telegram.org/bot$TG_TOKEN/sendMessage \
              -d chat_id=$CHAT_ID -d text="✅ DeepSeek AI: OK (Verified by NetGuardSentinelDS)"
          else
            echo "DeepSeek AI: FAILED"
            # ব্যর্থ হলে আসল কারণটি টেলিগ্রামে পাঠিয়ে দিবে
            curl -s -X POST https://api.telegram.org/bot$TG_TOKEN/sendMessage \
              -d chat_id=$CHAT_ID -d text="❌ AI Connection Failed. API Response: $AI_RES"
            exit 1
          fi

      - name: 3. Final Report
        run: echo "🎉 Ready for the AI Revolution!"
