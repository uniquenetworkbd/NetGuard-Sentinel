name: 🚀 Dual-Engine Health Check

on:
  workflow_dispatch: 

jobs:
  validate-system:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Repo Checkout
        uses: actions/checkout@v4

      - name: 2. Check All Engines
        env:
          DS_KEY: ${{ secrets.NSDS }}
          VIBE_KEY: ${{ secrets.VibecodeCLI }}
          TG_TOKEN: ${{ secrets.TELEGRAMBOTTOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAMCHATID }}
        run: |
          # ১. টেলিগ্রাম কানেকশন চেক
          echo "📡 Testing Telegram..."
          curl -s -X POST https://api.telegram.org/bot$TG_TOKEN/sendMessage \
            -d chat_id=$CHAT_ID -d text="🔍 Health Check Started: Testing NSDS and VibecodeCLI..."

          # ২. DeepSeek (NSDS) চেক
          echo "🧠 Testing DeepSeek (NSDS)..."
          AI_RES=$(curl -s https://api.deepseek.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DS_KEY" \
            -d '{"model": "deepseek-chat", "messages": [{"role": "user", "content": "Hi"}]}')
          
          if [[ $AI_RES == *"choices"* ]]; then
            curl -s -X POST https://api.telegram.org/bot$TG_TOKEN/sendMessage \
              -d chat_id=$CHAT_ID -d text="✅ NSDS AI Engine: ONLINE"
          else
            curl -s -X POST https://api.telegram.org/bot$TG_TOKEN/sendMessage \
              -d chat_id=$CHAT_ID -d text="❌ NSDS AI Failed. Reason: $AI_RES"
          fi

          # ৩. VibecodeCLI (Secret existence) চেক
          echo "🛠️ Testing VibecodeCLI Key..."
          if [[ -n "$VIBE_KEY" ]]; then
            curl -s -X POST https://api.telegram.org/bot$TG_TOKEN/sendMessage \
              -d chat_id=$CHAT_ID -d text="✅ VibecodeCLI Key: DETECTED & LOADED"
          else
            curl -s -X POST https://api.telegram.org/bot$TG_TOKEN/sendMessage \
              -d chat_id=$CHAT_ID -d text="❌ VibecodeCLI Key: NOT FOUND"
          fi

      - name: 3. Final Status
        run: echo "Health check sequence completed."
