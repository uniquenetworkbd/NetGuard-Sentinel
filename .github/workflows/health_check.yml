name: 🚀 System Health Check

on:
  workflow_dispatch: # আপনি ম্যানুয়ালি রান করবেন

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Test Connections (AI & Telegram)
        env:
          DS_KEY: ${{ secrets.NETGUARDSENTINELDS }}
          TG_TOKEN: ${{ secrets.TELEGRAMBOTTOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAMCHATID }}
        run: |
          echo "🔍 Testing Telegram Connection..."
          TG_RES=$(curl -s -X POST https://api.telegram.org/bot$TG_TOKEN/sendMessage \
            -d chat_id=$CHAT_ID -d text="✅ Giant Brain Health Check: Telegram connection is ACTIVE.")
          
          if [[ $TG_RES == *"\"ok\":true"* ]]; then
            echo "Telegram: OK"
          else
            echo "Telegram: FAILED"
            exit 1
          fi

          echo "🔍 Testing DeepSeek AI Connection..."
          AI_RES=$(curl -s https://api.deepseek.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DS_KEY" \
            -d '{"model": "deepseek-chat", "messages": [{"role": "user", "content": "Say Hello!"}]}')
          
          if [[ $AI_RES == *"choices"* ]]; then
            echo "DeepSeek AI: OK"
            curl -s -X POST https://api.telegram.org/bot$TG_TOKEN/sendMessage \
              -d chat_id=$CHAT_ID -d text="✅ Giant Brain Health Check: DeepSeek AI Engine is ACTIVE."
          else
            echo "DeepSeek AI: FAILED"
            curl -s -X POST https://api.telegram.org/bot$TG_TOKEN/sendMessage \
              -d chat_id=$CHAT_ID -d text="❌ DeepSeek AI Connection Failed. Please check your DS_KEY."
            exit 1
          fi

      - name: 3. Final Report
        run: echo "🎉 All systems are operational! Your Giant Brain is ready for the revolution."
