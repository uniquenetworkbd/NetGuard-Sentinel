name: Supreme Nano-AI Architect

on:
  workflow_dispatch:

env:
  TG_TOKEN: "8663755860:AAHX0_2CPgLb8MVKk8b9iG59gy3Sd_2RZB0"
  CHAT_ID: "5519303439"
  DS_KEY: "sk-94945e8a5d9740ebac3b702b000f51df"

jobs:
  autonomous-build:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: 1. Deep-Clean & Checkout
        uses: actions/checkout@v4

      - name: 2. Signal Telegram
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ env.TG_TOKEN }}/sendMessage \
          -d chat_id=${{ env.CHAT_ID }} \
          -d text="🧠 Nano-AI Architect is waking up. Cleaning environment and reconstructing project... 🧹"

      - name: 3. Force-Construct Industrial Architecture
        run: |
          # পুরোনো সব ফাইল ডিলিট করে নতুন করে শুরু
          find . -maxdepth 1 -not -path '*/.*' -not -name '.git' -not -name '.github' -delete
          
          mkdir -p app/src/main/java/com/guardnet/vpn
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # ১. Settings Config
          echo "rootProject.name = 'NetGuard-Sentinel'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          # ২. Root Build Script
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0'; classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0" }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # ৩. App Module Logic
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application'; id 'kotlin-android' }
          android {
              namespace 'com.guardnet.vpn'
              compileSdk 34
              defaultConfig { applicationId "com.guardnet.vpn"; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" }
              buildTypes { release { minifyEnabled false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          # ৪. Android Manifest
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.guardnet.vpn"><application android:label="NetGuard Sentinel" android:theme="@style/Theme.AppCompat.Light.NoActionBar"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>' > app/src/main/AndroidManifest.xml

          # ৫. MainActivity
          cat <<EOF > app/src/main/java/com/guardnet/vpn/MainActivity.kt
          package com.guardnet.vpn
          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
              }
          }
          EOF

      - name: 4. Build Phase
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: 5. Victory: Deliver APK to Telegram
        if: success()
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          curl -F chat_id=${{ env.CHAT_ID }} -F document=@"$APK_PATH" \
          https://api.telegram.org/bot${{ env.TG_TOKEN }}/sendDocument -F caption="✅ MISSION ACCOMPLISHED! Your Supreme APK is ready."

      - name: 6. Failure Notification
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ env.TG_TOKEN }}/sendMessage \
          -d chat_id=${{ env.CHAT_ID }} -d text="⚠️ Build blocked. Nano-AI is generating diagnostics. Stand by..."
