name: NetGuard Final APK Generation

on:
  workflow_dispatch:

env:
  TG_TOKEN: "8663755860:AAHX0_2CPgLb8MVKk8b9iG59gy3Sd_2RZB0"
  CHAT_ID: "5519303439"

jobs:
  build-and-deliver:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: 1. Absolute Wipe & Checkout
        uses: actions/checkout@v4

      - name: 2. Force Structure Reconstruction
        run: |
          # পুরোনো সবকিছু মুছে ফেলা (নিরাপদ থাকার জন্য)
          find . -maxdepth 1 -not -path '*/.*' -not -name '.git' -not -name '.github' -delete
          
          mkdir -p app/src/main/java/com/guardnet/vpn
          mkdir -p app/src/main/res/values
          
          # Root Settings
          echo "rootProject.name = 'NetGuard-Sentinel'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          # App Build Logic
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application'; id 'kotlin-android' }
          android {
              namespace 'com.guardnet.vpn'
              compileSdk 34
              defaultConfig { applicationId "com.guardnet.vpn"; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" }
              buildTypes { release { minifyEnabled false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # Minimum Required Manifest
          mkdir -p app/src/main
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="NetGuard"></application></manifest>' > app/src/main/AndroidManifest.xml

      - name: 3. Execution (Standard Build)
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: 4. Success Signal & Send APK
        if: success()
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          curl -F chat_id=${{ env.CHAT_ID }} -F document=@"$APK_PATH" \
          https://api.telegram.org/bot${{ env.TG_TOKEN }}/sendDocument -F caption="✅ SUCCESS! Your Fresh APK is ready."

      - name: 5. Failure Notification
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ env.TG_TOKEN }}/sendMessage \
          -d chat_id=${{ env.CHAT_ID }} -d text="❌ Still an error in logic. Please check the 'Summary' in GitHub for details."
