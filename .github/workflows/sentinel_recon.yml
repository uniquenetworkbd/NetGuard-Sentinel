name: 🔍 Sentinel Recon: Project Auditor

on:
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য
  schedule:
    - cron: '0 0 * * *' # প্রতিদিন রাত ১২টায় অটোমেটিক স্ক্যান করবে

jobs:
  audit-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Neural Connection
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛰️ Deep Scan & Reporting
        env:
          TG_TOKEN: ${{ secrets.TELEGRAMBOTTOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAMCHATID }}
        run: |
          echo "🔍 Starting Deep Scan..."
          
          # ১. ডিরেক্টরি স্ট্রাকচার তৈরি
          PROJECT_TREE=$(tree -L 3 -I 'node_modules|.git' --dirsfirst)
          
          # ২. স্টোরেজ এনালাইসিস
          STORAGE_INFO=$(du -sh . | awk '{print $1}')
          FILE_COUNT=$(find . -type f | wc -l)
          
          # ৩. প্রফেশনাল রিপোর্ট ফরম্যাট
          REPORT="📊 *SENTINEL RECON REPORT* 📊%0A%0A"
          REPORT+="📂 *Current Structure:*%0A\`\`\`%0A$PROJECT_TREE%0A\`\`\`%0A"
          REPORT+="📈 *Storage Usage:* $STORAGE_INFO / 1024MB%0A"
          REPORT+="📄 *Total Files:* $FILE_COUNT%0A"
          REPORT+="🛡️ *System Health:* OPERATIONAL (Verified)%0A"
          REPORT+="🕒 *Scan Time:* $(date)"

          # ৪. টেলিগ্রামে রিপোর্ট পাঠানো
          curl -s -X POST https://api.telegram.org/bot$TG_TOKEN/sendMessage \
            -d chat_id=$CHAT_ID -d parse_mode="Markdown" -d text="$REPORT"
