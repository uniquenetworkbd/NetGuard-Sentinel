name: The One-Shot Master Builder

on:
  workflow_dispatch:

jobs:
  rebuild-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: 1. Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2. Force Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/guardnet/vpn/data
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values

      - name: 3. Setup Gradle Wrapper (The Engine)
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: 4. Build Final APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 5. Upload NetGuard APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NetGuard-Sentinel-V1
          path: app/build/outputs/apk/debug/*.apk

      - name: 6. Save Engine to Repo
        if: always()
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Engine and structure stabilized" || echo "No changes"
          git push
