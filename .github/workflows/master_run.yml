name: NetGuard Sentinel Final Mission

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: 1. Repair Project Structure (Crucial)
        run: |
          # ১. settings.gradle ফাইল জোর করে তৈরি করা
          echo "rootProject.name = 'NetGuard-Sentinel'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          # ২. প্রজেক্ট লেভেল build.gradle তৈরি
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.2.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # ৩. Gradle Wrapper এবং পারমিশন ঠিক করা
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          echo "✅ Project Structure Repaired."

      - name: 2. Setup Environment (Java 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. Compile APK
        # এবার এটি অবশ্যই 'app' মডিউল খুঁজে পাবে
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: 4. Deliver NetGuard Sentinel APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NetGuard-Final-V1
          path: app/build/outputs/apk/debug/*.apk

      - name: 5. Force Sync to GitHub
        if: always()
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Repaired root structure and build successfully" || echo "No changes"
          git push
