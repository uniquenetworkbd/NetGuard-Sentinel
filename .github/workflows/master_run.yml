name: DeepSeek API Validator Only

on:
  workflow_dispatch:

jobs:
  check-api:
    runs-on: ubuntu-latest
    steps:
      - name: Testing DeepSeek API Connection
        run: |
          echo "Connecting to DeepSeek Server..."
          # আপনার দেওয়া টোকেন সরাসরি ব্যবহার করা হয়েছে
          RESPONSE=$(curl -s -X POST https://api.deepseek.com/chat/completions \
            -H "Authorization: Bearer sk-94945e8a5d9740ebac3b702b000f51df" \
            -H "Content-Type: application/json" \
            -d '{"model": "deepseek-chat", "messages": [{"role": "user", "content": "Test Connectivity"}]}')
          
          # ফলাফল বিশ্লেষণ
          if [[ $RESPONSE == *"choices"* ]]; then
            echo "✅ SUCCESS: API Token is working perfectly!"
            echo "Response: $RESPONSE"
          elif [[ $RESPONSE == *"Authentication Fails"* ]] || [[ $RESPONSE == *"invalid_api_key"* ]]; then
            echo "❌ FAILED: Invalid API Key. Please check the token."
            echo "Error: $RESPONSE"
            exit 1
          else
            echo "⚠️ SERVER ERROR: API reachable but something else went wrong."
            echo "Full Response: $RESPONSE"
            exit 1
          fi
